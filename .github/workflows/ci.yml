name: Code Quality & Testing

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci:
    name: Run CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Match your local project version
          cache: 'npm'       # Automatically caches npm dependencies

      - name: Install dependencies
        run: npm ci          # Ensures deterministic, identical local/CI builds

      - name: Check code formatting (Prettier)
        run: npm run format:check

      - name: Run static analysis (ESLint)
        run: npm run lint

      - name: Execute unit tests (Vitest)
        run: npm run test:ci
